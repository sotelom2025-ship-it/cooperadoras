<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Cooperadoras — Consejo Escolar La Matanza</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:'DM Sans',sans-serif;background:#F0F2F5;color:#0F1B35;min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#C9D0DC;border-radius:9px}

/* ── TOKENS ── */
:root{
  --navy:#0D2F6E;--navy2:#1848A8;--navy3:#EEF3FC;
  --green:#1E5C2B;--green2:#E6F4EA;
  --red:#8B1A1A;--red2:#FDEAEA;
  --amber:#7A4A00;--amber2:#FEF6E4;
  --border:#DDE3EE;--border2:#C4CEDF;
  --text:#0F1B35;--text2:#3D4F6E;--muted:#6B7B96;
  --surface:#FFFFFF;--bg:#F0F2F5;--bg2:#F7F8FB;
  --shadow:0 1px 3px rgba(15,27,53,.08),0 4px 16px rgba(15,27,53,.06);
  --shadow2:0 8px 32px rgba(15,27,53,.12);
  --r:10px;--rs:6px;
  --sw:240px;
}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh}
.screen.active{display:flex}

/* ══════════════════════════════
   ONBOARDING
══════════════════════════════ */
#scr-onboard{background:var(--navy);align-items:center;justify-content:center;padding:1.5rem;
  background-image:radial-gradient(ellipse 70% 60% at 90% 10%, rgba(26,72,168,.5) 0%, transparent 60%),
  radial-gradient(ellipse 50% 40% at 10% 90%, rgba(0,0,0,.2) 0%, transparent 50%)}
.ob-wrap{width:100%;max-width:520px}
.ob-card{background:var(--surface);border-radius:16px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.25)}
.ob-head{background:var(--navy);padding:2rem 2rem 1.75rem}
.ob-brand{display:flex;align-items:center;gap:.875rem;margin-bottom:1.25rem}
.brand-mark{font-size:1.75rem;font-weight:900;color:#fff;letter-spacing:-2px;line-height:1}
.brand-mark .o{color:#E07B00}.brand-mark .b{color:#3EC6E0}
.brand-text{color:rgba(255,255,255,.8);font-size:.78rem;line-height:1.45}
.brand-text strong{display:block;color:#fff;font-size:.88rem;margin-bottom:.1rem}
.ob-ttl{color:#fff;font-size:1.1rem;font-weight:700;margin-bottom:.35rem}
.ob-sub{color:rgba(255,255,255,.65);font-size:.82rem;line-height:1.55}
.ob-body{padding:2rem}
.steps{display:flex;flex-direction:column;gap:.875rem;margin-bottom:1.625rem}
.step{display:flex;gap:.875rem;align-items:flex-start}
.step-n{width:24px;height:24px;border-radius:50%;background:var(--navy);color:#fff;font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:.15rem}
.step-t{font-size:.85rem;color:var(--text2);line-height:1.5}
.step-t strong{color:var(--text);font-weight:600}
.step-t code{background:var(--navy3);color:var(--navy);padding:.1rem .4rem;border-radius:4px;font-size:.78rem;font-family:monospace}
.url-row{display:flex;gap:.5rem;margin-bottom:.5rem}
.url-inp{flex:1;padding:.65rem .875rem;border:1.5px solid var(--border2);border-radius:var(--rs);font-size:.85rem;background:var(--bg2);transition:border-color .15s}
.url-inp:focus{outline:none;border-color:var(--navy);background:#fff}
.ob-err{color:var(--red);font-size:.78rem;margin-top:.35rem;display:none;padding:.45rem .75rem;background:var(--red2);border-radius:var(--rs)}
.ob-skip{font-size:.78rem;color:var(--muted);text-align:center;margin-top:.875rem;cursor:pointer}
.ob-skip:hover{color:var(--navy);text-decoration:underline}

/* ══════════════════════════════
   LOGIN
══════════════════════════════ */
#scr-login{background:var(--bg);align-items:center;justify-content:center;padding:1.5rem;flex-direction:column;gap:1.5rem}
.lg-card{background:var(--surface);border-radius:16px;width:100%;max-width:400px;overflow:hidden;box-shadow:var(--shadow2)}
.lg-head{background:var(--navy);padding:2rem 2rem 1.75rem}
.lg-brand{display:flex;align-items:center;gap:.875rem;margin-bottom:.875rem}
.lg-ttl{color:rgba(255,255,255,.75);font-size:.82rem;line-height:1.45;font-weight:400}
.lg-body{padding:1.75rem}
.field{display:flex;flex-direction:column;gap:.375rem;margin-bottom:1rem}
.f-lbl{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.f-inp{padding:.65rem .875rem;border:1.5px solid var(--border2);border-radius:var(--rs);font-size:.9rem;background:var(--bg2);transition:border-color .15s,box-shadow .15s}
.f-inp:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(13,47,110,.1);background:#fff}
.pw-w{position:relative}.pw-w .f-inp{padding-right:2.75rem}
.pw-eye{position:absolute;right:.75rem;top:50%;transform:translateY(-50%);color:var(--muted);padding:.2rem;font-size:1rem;transition:color .15s}.pw-eye:hover{color:var(--navy)}
.lg-err{display:none;padding:.55rem .875rem;background:var(--red2);border:1px solid #f0c0c0;border-radius:var(--rs);font-size:.82rem;color:var(--red);margin-bottom:.875rem}
.btn-login{width:100%;padding:.75rem;background:var(--navy);color:#fff;border-radius:var(--rs);font-size:.9rem;font-weight:700;letter-spacing:.02em;transition:background .15s,transform .08s}
.btn-login:hover{background:var(--navy2)}
.btn-login:active{transform:scale(.99)}
.lg-foot{font-size:.72rem;color:var(--muted);text-align:center;margin-top:1.125rem;line-height:1.5}

/* ══════════════════════════════
   APP SHELL
══════════════════════════════ */
#scr-app{flex-direction:row;background:var(--bg)}

/* SIDEBAR */
.sidebar{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;z-index:100}
.sb-brand{padding:1.5rem 1.25rem 1.25rem;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-mtz{font-size:1.5rem;font-weight:900;color:#fff;letter-spacing:-1.5px;line-height:1;margin-bottom:.35rem}
.sb-mtz .o{color:#E07B00}.sb-mtz .b{color:#3EC6E0}
.sb-sub{font-size:.7rem;color:rgba(255,255,255,.55);line-height:1.45}
.sb-sub strong{display:block;color:rgba(255,255,255,.85);font-size:.78rem;margin-bottom:.1rem}
.sb-nav{flex:1;padding:.875rem .75rem;display:flex;flex-direction:column;gap:.2rem;overflow-y:auto}
.nav-i{display:flex;align-items:center;gap:.75rem;padding:.625rem .875rem;border-radius:8px;color:rgba(255,255,255,.55);cursor:pointer;font-size:.82rem;font-weight:500;transition:background .15s,color .15s;border:none;background:none;width:100%;text-align:left}
.nav-i:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-i.on{background:rgba(255,255,255,.16);color:#fff;font-weight:600}
.nav-i .ico{font-size:.95rem;width:18px;text-align:center;flex-shrink:0}
.sb-foot{padding:1rem;border-top:1px solid rgba(255,255,255,.1)}
.sb-user{display:flex;align-items:center;gap:.75rem;padding:.5rem .625rem;border-radius:8px;cursor:pointer;transition:background .15s;width:100%;border:none;background:none;text-align:left}
.sb-user:hover{background:rgba(255,255,255,.1)}
.u-av{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:#fff;flex-shrink:0}
.u-info{flex:1;min-width:0}
.u-name{font-size:.8rem;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.u-role{font-size:.68rem;color:rgba(255,255,255,.55)}
.u-out{font-size:.82rem;color:rgba(255,255,255,.4)}.u-out:hover{color:#fff}

/* BOTTOM NAV */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:.5rem 0;padding-bottom:env(safe-area-inset-bottom,0);z-index:100;justify-content:space-around;box-shadow:0 -2px 12px rgba(0,0,0,.08)}
.bn-i{display:flex;flex-direction:column;align-items:center;gap:.2rem;color:var(--muted);cursor:pointer;padding:.35rem .75rem;border-radius:8px;font-size:.62rem;font-weight:600;min-width:52px;transition:color .15s;border:none;background:none}
.bn-i .ico{font-size:1.15rem}
.bn-i.on{color:var(--navy)}

/* MAIN */
.main{margin-left:var(--sw);flex:1;min-height:100vh;display:flex;flex-direction:column}
.content{padding:2rem 2.25rem;flex:1;max-width:1400px;width:100%}

/* SECTIONS */
.sec{display:none}.sec.on{display:block}

/* ── CONN BANNER ── */
.conn-banner{background:var(--red2);border:1px solid #e0b0b0;border-radius:var(--rs);padding:.75rem 1rem;display:none;align-items:center;gap:.75rem;margin-bottom:1.25rem;font-size:.82rem;color:var(--red)}
.conn-banner.show{display:flex}

/* ── PAGE HEADER ── */
.ph{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
.ph-ttl{font-size:1.2rem;font-weight:800;color:var(--text);letter-spacing:-.01em}
.ph-sub{font-size:.78rem;color:var(--muted);margin-top:.2rem}

/* ── STATS ── */
.stats{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1.5rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.875rem 1.125rem;min-width:90px}
.stat-v{font-size:1.75rem;font-weight:800;color:var(--navy);line-height:1;letter-spacing:-.03em}
.stat-l{font-size:.7rem;color:var(--muted);margin-top:.2rem;font-weight:500;text-transform:uppercase;letter-spacing:.03em}

/* ── SEARCH ── */
.search-row{display:flex;gap:.625rem;margin-bottom:.875rem;flex-wrap:wrap}
.search-w{flex:1;min-width:200px;position:relative}
.s-ico{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:.875rem}
.s-inp{width:100%;padding:.6rem .875rem .6rem 2.25rem;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--surface);font-size:.875rem;transition:border-color .15s}
.s-inp:focus{outline:none;border-color:var(--navy)}
.fbar{display:flex;gap:.375rem;flex-wrap:wrap;margin-bottom:.75rem;align-items:center;width:100%;box-sizing:border-box}
.fp{padding:.3rem .75rem;border:1.5px solid var(--border);border-radius:99px;font-size:.75rem;font-weight:500;cursor:pointer;background:var(--surface);color:var(--muted);transition:all .15s;white-space:nowrap}
.fp:hover{border-color:var(--navy);color:var(--navy)}
.fp.on{background:var(--navy);border-color:var(--navy);color:#fff}
.fsel{min-width:0;flex:1 1 130px;padding:.32rem .65rem;border:1.5px solid var(--border);border-radius:var(--rs);font-size:.75rem;background:var(--surface);color:var(--text);cursor:pointer}
.fsel:focus{outline:none;border-color:var(--navy)}

/* ── SCHOOL GRID ── */
.sg{display:grid;grid-template-columns:1fr;gap:.5rem}
@media(min-width:1280px){.sg{grid-template-columns:1fr 1fr}}
@media(min-width:1600px){.sg{grid-template-columns:1fr 1fr 1fr}}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.875rem 1rem;cursor:pointer;display:flex;align-items:center;gap:.875rem;transition:box-shadow .15s,border-color .15s,transform .1s}
.sc:hover{box-shadow:var(--shadow);border-color:#B8C8E8;transform:translateY(-1px)}
.sc-av{width:44px;height:44px;border-radius:8px;background:var(--navy3);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.68rem;color:var(--navy);flex-shrink:0;text-align:center;line-height:1.2;padding:.2rem}
.sc-info{flex:1;min-width:0}
.sc-name{font-weight:600;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-meta{font-size:.73rem;color:var(--muted);margin-top:.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-tags{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.4rem}

/* ── TAGS ── */
.tag{font-size:.67rem;font-weight:700;padding:.15rem .5rem;border-radius:99px;white-space:nowrap;letter-spacing:.01em}
.tg{background:var(--green2);color:var(--green)}
.tb{background:var(--navy3);color:var(--navy)}
.tr{background:var(--red2);color:var(--red)}
.ta{background:var(--amber2);color:var(--amber)}
.tm{background:#F3F4F6;color:#4B5563}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1.125rem;border-radius:var(--rs);font-size:.82rem;font-weight:600;transition:all .15s;letter-spacing:.01em;cursor:pointer;border:none}
.btn-p{background:var(--navy);color:#fff}.btn-p:hover{background:var(--navy2)}
.btn-s{background:var(--surface);color:var(--text);border:1.5px solid var(--border)}.btn-s:hover{border-color:var(--navy);color:var(--navy)}
.btn-d{background:var(--red2);color:var(--red);border:1px solid #dbb0b0}.btn-d:hover{background:#fde0e0}
.btn-sm{padding:.35rem .75rem;font-size:.75rem}
.btn-xs{padding:.2rem .55rem;font-size:.7rem}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r)}
.card-p{padding:1.25rem}.card-p-sm{padding:.875rem 1rem}

/* ── MODALS ── */
.moverlay{position:fixed;inset:0;background:rgba(15,27,53,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.moverlay.open{display:flex;animation:fi .15s}
.modal{background:var(--surface);border-radius:14px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.2);animation:su .18s}
.mhd{position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--border);padding:1.125rem 1.375rem;display:flex;align-items:center;justify-content:space-between;z-index:1}
.mttl{font-size:.95rem;font-weight:700}
.mcl{width:30px;height:30px;border-radius:6px;background:var(--bg);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;transition:background .15s;border:none}.mcl:hover{background:var(--border)}
.mbody{padding:1.375rem}
.mfoot{padding:.875rem 1.375rem;border-top:1px solid var(--border);display:flex;gap:.5rem;justify-content:flex-end}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1.5px solid var(--border);margin-bottom:1.5rem;overflow-x:auto}
.tab{padding:.6rem 1.125rem;font-size:.8rem;font-weight:600;color:var(--muted);border-bottom:2.5px solid transparent;margin-bottom:-1.5px;white-space:nowrap;transition:color .15s,border-color .15s;cursor:pointer;border:none;background:none}
.tab:hover{color:var(--navy)}
.tab.on{color:var(--navy);border-bottom-color:var(--navy)}

/* ── FORMS ── */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:.875rem 1.125rem}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.875rem 1.125rem}
.c2{grid-column:span 2}.c3{grid-column:span 3}
.ff{display:flex;flex-direction:column;gap:.35rem}
.fl{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.fi,.fs,.ft{padding:.6rem .875rem;border:1.5px solid var(--border2);border-radius:var(--rs);background:var(--bg2);font-size:.875rem;transition:border-color .15s,box-shadow .15s}
.fi:focus,.fs:focus,.ft:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(13,47,110,.08);background:#fff}
.ft{resize:vertical;min-height:76px}
.fs-ttl{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--navy);margin-bottom:.875rem;padding-bottom:.5rem;border-bottom:1px solid var(--navy3)}

/* ── TOGGLE GROUP ── */
.tgg{display:flex;gap:.35rem;flex-wrap:wrap}
.tg-o{padding:.35rem .8rem;border:1.5px solid var(--border2);border-radius:99px;font-size:.78rem;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s;background:none}
.tg-o:hover{border-color:var(--navy);color:var(--navy)}
.tg-o.on{background:var(--navy);border-color:var(--navy);color:#fff}
.tg-o.og{background:var(--green);border-color:var(--green);color:#fff}
.tg-o.or{background:var(--red);border-color:var(--red);color:#fff}
.tg-o.oa{background:var(--amber);border-color:var(--amber);color:#fff}

/* ── PERIOD / VISIT ── */
.pitem{border:1px solid var(--border);border-radius:var(--rs);margin-bottom:.5rem;overflow:hidden}
.phd{display:flex;justify-content:space-between;align-items:center;padding:.75rem 1rem;cursor:pointer;gap:.5rem;transition:background .15s}.phd:hover{background:var(--bg2)}
.pname{font-weight:600;font-size:.85rem}
.pmeta{font-size:.72rem;color:var(--muted);margin-top:.1rem}
.pbody{padding:.875rem 1rem;border-top:1px solid var(--border);display:none;background:var(--bg2)}
.pbody.open{display:block}

.vitem{border:1px solid var(--border);border-radius:var(--rs);padding:.875rem 1rem;margin-bottom:.5rem;cursor:pointer;transition:border-color .15s}
.vitem:hover{border-color:var(--navy)}
.vhd{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem}
.vtipo{font-size:.7rem;font-weight:700;padding:.2rem .55rem;border-radius:99px;text-transform:uppercase;background:var(--navy3);color:var(--navy)}
.vdate{font-size:.72rem;color:var(--muted)}
.vdesc{font-size:.82rem;margin-top:.35rem;line-height:1.4}
.vprox{font-size:.72rem;color:var(--amber);margin-top:.2rem}

/* ── COORD ── */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.75rem}
.ccard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.125rem;cursor:pointer;transition:box-shadow .15s,border-color .15s}
.ccard:hover{box-shadow:var(--shadow);border-color:#B8C8E8}
.cname{font-size:1rem;font-weight:800;color:var(--navy);margin-bottom:.15rem}
.ccordon{font-size:.72rem;color:var(--muted);margin-bottom:.625rem;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.clocs{display:flex;gap:.3rem;flex-wrap:wrap}
.csttl{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:.875rem 0 .5rem;padding-bottom:.4rem;border-bottom:1px solid var(--border)}

/* ── ASSEMBLY ── */
.agrp-ttl{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:1.25rem 0 .625rem;display:flex;align-items:center;gap:.5rem}
.acnt{background:var(--bg);padding:.1rem .5rem;border-radius:99px;font-size:.68rem}
.aitem{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:.75rem 1rem;margin-bottom:.4rem;cursor:pointer;display:flex;align-items:center;gap:.875rem;flex-wrap:wrap;transition:border-color .15s,box-shadow .15s}
.aitem:hover{border-color:var(--navy);box-shadow:var(--shadow)}
.dbadge{font-size:.7rem;font-weight:700;padding:.2rem .6rem;border-radius:99px;white-space:nowrap;flex-shrink:0}
.df{background:var(--green2);color:var(--green)}
.dt{background:var(--navy);color:#fff}
.dp{background:#F3F4F6;color:#4B5563}
.dn{background:var(--amber2);color:var(--amber)}

/* ── INFO BOXES ── */
.ib{padding:.75rem 1rem;border-radius:var(--rs);font-size:.83rem;border:1px solid}
.ib-b{background:var(--navy3);border-color:#B8C8E8;color:var(--navy)}
.ib-g{background:var(--green2);border-color:#A8D4B0;color:var(--green)}
.ib-r{background:var(--red2);border-color:#E0B0B0;color:var(--red)}
.ib-a{background:var(--amber2);border-color:#D4C090;color:var(--amber)}

/* ── PDF ── */
.ptgg{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.875rem}
.lpill{padding:.3rem .65rem;border:1.5px solid var(--border);border-radius:99px;font-size:.73rem;font-weight:500;cursor:pointer;color:var(--muted);background:var(--surface);transition:all .15s}
.lpill.on{background:var(--navy);border-color:var(--navy);color:#fff}

/* ── USERS ── */
.urow{display:flex;align-items:center;gap:.875rem;padding:.875rem 0;border-bottom:1px solid var(--border)}
.urow:last-child{border-bottom:none}
.uav{width:36px;height:36px;border-radius:50%;background:var(--navy3);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;color:var(--navy);flex-shrink:0}
